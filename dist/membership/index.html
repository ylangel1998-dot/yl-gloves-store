<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Membership - The GloveStory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; color: #333; }
    header { padding: 2rem; text-align: center; border-bottom: 1px solid #eee; }
    .logo { font-size: 1.5rem; letter-spacing: 0.3em; text-decoration: none; color: #333; }
    nav { margin-top: 1rem; }
    nav a { margin: 0 1rem; text-decoration: none; color: #666; }
    main { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; text-align: center; }
    .vip-card { background: #1a1a1a; color: white; padding: 4rem 2rem; border-radius: 8px; margin: 2rem 0; }
    .price { font-size: 4rem; font-weight: 300; }
    .period { font-size: 1.2rem; opacity: 0.7; }
    .features { list-style: none; margin: 2rem 0; text-align: left; }
    .features li { padding: 0.8rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .features li:before { content: "✓ "; color: #4CAF50; }
    .cta { display: inline-block; background: white; color: #1a1a1a; padding: 1rem 3rem; text-decoration: none; font-weight: 500; margin-top: 1rem; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">THE GLOVESTORY</a>
    <nav>
      <a href="/">Home</a>
      <a href="/products">Collections</a>
      <a href="/about">About</a>
      <a href="/membership">Join VIP</a>
    </nav>
  </header>
  <main>
    <h1>Exclusive Membership</h1>
    <div class="vip-card">
      <div class="price">$19.9</div>
      <div class="period">per month</div>
      <ul class="features">
        <li>40% OFF on all products</li>
        <li>Early access to new collections</li>
        <li>Free shipping worldwide</li>
        <li>Complimentary glove cleaning</li>
        <li>Priority customer support</li>
        <li>Exclusive member events</li>
      </ul>
      <a href="#" class="cta">JOIN NOW</a>
    </div>
  </main>
</body>
</html>
